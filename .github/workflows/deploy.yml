name: 🚀 Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐧 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql, redis
          tools: composer:v2
          cache: composer

      - name: � Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: � Install Dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
          npm ci

      - name: 🔨 Build Assets
        run: |
          npm run build

      - name: � Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_IP }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: ${{ secrets.ORACLE_PORT }}
          script: |
            cd /home/ubuntu/app
            
            # Backup atual
            sudo cp -r /home/ubuntu/app /home/ubuntu/backup_$(date +%Y%m%d_%H%M%S)
            
            # Pull novo código
            git pull origin main
            
            # Instala dependências
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            
            # Build assets (se necessário)
            npm ci
            npm run build
            
            # Docker Compose com Redis
            docker-compose down
            docker-compose up -d --build
            
            # Limpa cache Laravel
            php artisan cache:clear
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            
            # Otimiza produção
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Permissões
            sudo chown -R www-data:www-data storage bootstrap/cache
            
            # Verifica containers
            docker ps
            docker logs redis_prod

      - name: 🧪 Health Check
        run: |
          sleep 30
          curl -f ${{ secrets.APP_URL }}/health || exit 1

      - name: 📊 Deployment Summary
        run: |
          echo "🎉 Deploy completed successfully!"
          echo "📦 Redis: $(curl -s http://localhost:6379 || echo 'Not accessible')"
          echo "🌐 App: ${{ secrets.APP_URL }}"
          echo "📅 Deployed at: $(date)"