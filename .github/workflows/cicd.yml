name: 🚀 Build & Deploy Total Clean

on:
  push:
    branches: [main]

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, gd, zip

      - name: 📦 Install Composer
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🔨 Build Vite Assets (RAM do GitHub)
        run: |
          npm install
          npm run build
          # Validação: O build PRECISA ter gerado o manifesto
          test -f public/build/manifest.json && echo "✅ Manifesto gerado!" || exit 1

      - name: 🤐 Criar Pacote de Deploy
        # Zipamos tudo, incluindo o vendor e o public/build prontos
        run: zip -r deploy.zip . -x ".git/*" "node_modules/*" ".github/*" "tests/*"

      - name: 🔑 Configure SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚀 Reset Total e Deploy no Servidor
        run: |
          scp -o StrictHostKeyChecking=no deploy.zip ubuntu@147.15.80.52:/tmp/

          ssh -o StrictHostKeyChecking=no ubuntu@147.15.80.52 << 'EOF'
            set -e
            cd /var/www/erp
            
            echo "🧹 Limpeza Total (Preservando .env e storage)..."
            # Remove arquivos, mas mantém o que é essencial do servidor
            find . -maxdepth 1 ! -name '.env' ! -name 'storage' ! -name '.' -exec rm -rf {} +

            echo "📦 Extraindo novo código limpo..."
            unzip -o /tmp/deploy.zip -d .
            rm /tmp/deploy.zip

            echo "🗄️ Database & Cache..."
            # Força o refresh para garantir que o Portfólio esteja zerado e limpo
            php artisan migrate:fresh --seed --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "🔗 Storage Link..."
            # Garante que o link simbólico seja refeito após a limpeza
            rm -rf public/storage
            php artisan storage:link

            echo "🔐 Ajustando Permissões Finais..."
            sudo chown -R www-data:www-data /var/www/erp
            sudo chmod -R 775 storage bootstrap/cache public/build
            
            echo "🔄 Reiniciando PHP-FPM..."
            sudo systemctl restart php8.3-fpm
            
            echo "✅ Deploy Finalizado com Sucesso!"
          EOF